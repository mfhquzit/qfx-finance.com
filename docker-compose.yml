version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qfx-postgres
    environment:
      POSTGRES_USER: qfx_user
      POSTGRES_PASSWORD: qfx_secure
      POSTGRES_DB: qfx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qfx-redis
    ports:
      - "6379:6379"

  # A dummy API that always returns OK
  api:
    image: mendhak/http-https-echo
    container_name: qfx-api
    ports:
      - "3001:8080"
    environment:
      HTTP_PORT: 8080

  # Static HTML for client
  client:
    image: nginx:alpine
    container_name: qfx-client
    ports:
      - "3000:80"
    volumes:
      - ./static-client:/usr/share/nginx/html:ro

  admin:
    image: nginx:alpine
    container_name: qfx-admin
    ports:
      - "3002:80"
    volumes:
      - ./static-admin:/usr/share/nginx/html:ro

volumes:
  postgres_data:
